<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Civics Study</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .flag {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      color: #1a2e4a;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: #5a6a7e;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #d1dce8;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 2rem;
      flex-shrink: 0;
    }

    .card-text {
      text-align: left;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a2e4a;
      margin-bottom: 0.25rem;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #5a6a7e;
    }

    .card-arrow {
      margin-left: auto;
      color: #9dafc4;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="flag">🇺🇸</div>
    <h1>US Civics Study</h1>
    <p class="subtitle">Prepare for the USCIS naturalization test</p>

    <div class="cards">
      <a class="card" href="US_Civics_Practice_Test_2025.html">
        <div class="card-icon">📋</div>
        <div class="card-text">
          <div class="card-title">Practice Test 2025</div>
          <div class="card-desc">Full practice test with all 100 civics questions</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

      <a class="card" href="US_Civics_Quiz_20Q.html">
        <div class="card-icon">✏️</div>
        <div class="card-text">
          <div class="card-title">20-Question Quiz</div>
          <div class="card-desc">Quick quiz with 20 randomly selected questions</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
